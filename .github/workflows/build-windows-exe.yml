name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "export_delivery_statuses.py"
      - "webui_server.py"
      - "web/**"
      - "requirements.txt"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install greenlet
          pip install pyinstaller
          python -m playwright install chromium

      - name: Build web console EXE
        shell: pwsh
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onedir `
            --name saby_export_console `
            --hidden-import export_delivery_statuses `
            --hidden-import greenlet `
            --hidden-import greenlet._greenlet `
            --collect-all greenlet `
            --collect-submodules greenlet `
            --collect-binaries greenlet `
            --collect-all playwright `
            --add-data "web;web" `
            webui_server.py

      - name: Smoke check EXE + bundled Chromium
        shell: pwsh
        run: |
          $exe = "dist/saby_export_console/saby_export_console.exe"
          if (!(Test-Path $exe)) { throw "EXE not found: $exe" }
          $proc = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 5
          if ($proc.HasExited) {
            if ($proc.ExitCode -ne 0) { throw "EXE exited with code $($proc.ExitCode) right after start" }
          } else {
            Stop-Process -Id $proc.Id -Force
          }
          $chromeGlob = Get-ChildItem "dist/saby_export_console/_internal/playwright/driver/package/.local-browsers" -Recurse -Filter "chrome.exe" -ErrorAction SilentlyContinue
          if (!$chromeGlob) { throw "Bundled Playwright Chromium not found in package" }
          Write-Host "Bundled Chromium found:" $chromeGlob[0].FullName

      - name: Compose distributive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist/saby_export_console/* package/ -Recurse -Force
          Copy-Item start_windows_console.bat package/ -Force
          Copy-Item README.md package/ -Force
          if (Test-Path versions.md) { Copy-Item versions.md package/ -Force }
          if (Test-Path run_web.command) { Copy-Item run_web.command package/ -Force }
          if (Test-Path start_console.command) { Copy-Item start_console.command package/ -Force }
          Compress-Archive -Path package/* -DestinationPath saby_export_console_windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saby_export_console_windows
          path: saby_export_console_windows.zip
          if-no-files-found: error
